name: PR check

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - feature*
  pull_request:
    types: [opened, synchronize, reopened]

# Read-only by default — nothing here writes to the repo. SonarCloud PR
# decoration comes from the SonarCloud GitHub App, not GITHUB_TOKEN write scopes.
permissions:
  contents: read

jobs:
  check:
    name: Lint, types, tests, e2e & Sonar
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: matador
    steps:
      - name: Check out matador
        uses: actions/checkout@v6.0.3
        with:
          path: matador
          fetch-depth: 0          # full history improves Sonar new-code/blame relevancy
          persist-credentials: false

      # matador depends on toro through a local path (../toro), so check it out as a
      # sibling. Assumes toro lives under the same owner; adjust `repository:` if not.
      - name: Check out toro (sibling dependency)
        uses: actions/checkout@v6.0.3
        with:
          repository: ${{ github.repository_owner }}/toro
          path: toro
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format (ruff)
        run: uv run ruff format --check .

      - name: Type check (ty)
        run: uv run ty check

      - name: Tests (unit + integration)
        run: uv run pytest -m "unit or integration" --cov=matador --cov-report=xml

      # Runs only when SONAR_TOKEN is set (skipped on forks / before setup, so the
      # check stays green). Config is inline; projectBaseDir targets the matador
      # checkout because this job uses a sibling layout (matador/ + toro/).
      - name: SonarCloud scan
        if: env.SONAR_TOKEN
        uses: SonarSource/sonarqube-scan-action@v8.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: matador
          args: >
            -Dsonar.organization=ilovepixelart
            -Dsonar.projectName=matador
            -Dsonar.projectKey=ilovepixelart_matador
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.sources=matador
            -Dsonar.tests=tests
            -Dsonar.test.exclusions=tests/**
            -Dsonar.coverage.exclusions=tests/**

      - name: Install Playwright browser
        run: uv run playwright install --with-deps chromium

      - name: Tests (e2e)
        run: uv run pytest -m e2e
