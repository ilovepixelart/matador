name: PR check

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - feature*
  pull_request:
    types: [opened, synchronize, reopened]

# Read-only by default — nothing here writes to the repo. SonarCloud PR
# decoration comes from the SonarCloud GitHub App, not GITHUB_TOKEN write scopes.
permissions:
  contents: read

# A new push to the same branch/PR supersedes the previous run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, types, tests, e2e (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Everything the classifiers claim to support.
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    permissions:
      contents: read
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: matador
    steps:
      - name: Check out matador
        uses: actions/checkout@v6.0.3
        with:
          path: matador
          fetch-depth: 0          # full history improves Sonar new-code/blame relevancy
          persist-credentials: false

      # matador depends on toro through a local path (../toro), so check it out as a
      # sibling. Paired-branch development: if toro has a branch with the SAME name
      # as this one, use it (uv.lock embeds the sibling's metadata, so CI must see
      # the same toro the lock was generated against); otherwise fall back to main.
      - name: Pick the toro ref
        id: toro-ref
        working-directory: matador
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="${{ github.head_ref || github.ref_name }}"
          if gh api "repos/${{ github.repository_owner }}/toro/branches/$branch" --silent 2>/dev/null; then
            echo "ref=$branch" >> "$GITHUB_OUTPUT"
          else
            echo "ref=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out toro (sibling dependency)
        uses: actions/checkout@v6.0.3
        with:
          repository: ${{ github.repository_owner }}/toro
          ref: ${{ steps.toro-ref.outputs.ref }}
          path: toro
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --locked

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format (ruff)
        run: uv run ruff format --check .

      - name: Type check (ty)
        run: uv run ty check

      - name: Tests (unit + integration)
        run: uv run pytest -m "unit or integration" --cov=matador --cov-report=xml

      # Runs only when SONAR_TOKEN is set (skipped on forks / before setup, so the
      # check stays green), and only once per matrix — one coverage upload.
      # Config is inline; projectBaseDir targets the matador checkout because
      # this job uses a sibling layout (matador/ + toro/).
      - name: SonarCloud scan
        if: matrix.python-version == '3.13' && env.SONAR_TOKEN
        uses: SonarSource/sonarqube-scan-action@v8.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: matador
          # coverage.exclusions keeps the browser JS in analysis (issues) but out of the
          # coverage metric — it's exercised by the Playwright e2e suite, not line-instrumented.
          # exclusions drops the two vendored htmx extensions from analysis entirely.
          args: >
            -Dsonar.organization=ilovepixelart
            -Dsonar.projectName=matador
            -Dsonar.projectKey=ilovepixelart_matador
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.sources=matador
            -Dsonar.tests=tests
            -Dsonar.test.exclusions=tests/**
            -Dsonar.coverage.exclusions=tests/**,matador/static/js/**
            -Dsonar.exclusions=matador/static/js/response-targets.js,matador/static/js/loading-states.js

      # Browser behavior doesn't vary by Python — run the e2e layer once.
      - name: Install Playwright browser
        if: matrix.python-version == '3.13'
        run: uv run playwright install --with-deps chromium

      - name: Tests (e2e)
        if: matrix.python-version == '3.13'
        run: uv run pytest -m e2e
