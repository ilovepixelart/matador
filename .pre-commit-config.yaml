# Astral toolchain on every commit: ruff (lint + format) and ty (type check),
# plus the CSS build contract (app.css must match a fresh tailwind build —
# the same gate CI enforces, so a stale bundle never reaches a PR).
# Install once with:  uvx pre-commit install
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: ty
        name: ty (type check)
        entry: uv run ty check
        language: system
        types: [python]
        pass_filenames: false

      - id: css-fresh
        name: css build is fresh
        entry: bash -c './tailwindcss -i styles/input.css -o matador/static/app.css && git diff --quiet matador/static/app.css || { echo "app.css was stale — rebuilt, git add it and retry"; exit 1; }'
        language: system
        files: ^(styles/|matador/templates/|matador/static/app\.css)
        pass_filenames: false
