{% extends "layouts/base.html" %}
{% from "macros.html" import icon %}
{% block body %}
<main class="flex-1 grid place-items-center p-6">
  <div class="card max-w-md w-full p-8 text-center">
    <div class="text-danger mb-3 flex justify-center">{{ icon('warn', 'w-8 h-8') }}</div>
    <h1 class="text-lg font-semibold mb-1">{{ title or "Something went wrong" }}</h1>
    <p class="text-sm text-muted">{{ message }}</p>
    <a href="{{ url_for('index').path }}" class="btn btn-ghost mt-5 inline-flex">← Back to queues</a>
  </div>
</main>
{% endblock %}
